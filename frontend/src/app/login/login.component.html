<div style="display: flex; justify-content: center; margin-top: 100px;">
  <mat-card style="width: 400px; padding: 20px;">
    
    <mat-card-header>
      <mat-card-title>
        @if (isLoginMode) { Вход } @else { Регистрация }
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()" style="display: flex; flex-direction: column; margin-top: 20px;">
        <mat-form-field>
          <mat-label>Логин</mat-label>
          <input matInput [(ngModel)]="credentials.username" name="username" required>
        </mat-form-field>
        
        <mat-form-field>
          <mat-label>Пароль</mat-label>
          <input matInput type="password" [(ngModel)]="credentials.password" name="password" required>
        </mat-form-field>
        
        <button mat-raised-button color="primary" type="submit">
          @if (isLoginMode) { Войти } @else { Зарегистрироваться }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button (click)="toggleMode()" type="button">
        @if (isLoginMode) { Нет аккаунта? Создать } @else { Есть аккаунт? Войти }
      </button>
    </mat-card-actions>

  </mat-card>
</div>
