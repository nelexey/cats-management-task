<div class="login-wrapper">
  <mat-card class="login-card">
    
    @if (isLoading) {
      <mat-progress-bar mode="indeterminate" class="loader"></mat-progress-bar>
    }

    <mat-card-header class="login-header">
      <div mat-card-avatar class="header-avatar">🐾</div>
      <mat-card-title class="header-title">
        @if (isLoginMode) { Вход в систему } @else { Регистрация }
      </mat-card-title>
      <mat-card-subtitle>Панель заводчика</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="fill">
          <mat-label>Логин</mat-label>
          <input matInput [(ngModel)]="credentials.username" name="username" required [disabled]="isLoading">
        </mat-form-field>
        
        <mat-form-field appearance="fill">
          <mat-label>Пароль</mat-label>
          <input matInput type="password" [(ngModel)]="credentials.password" name="password" required [disabled]="isLoading">
        </mat-form-field>
        
        <button mat-flat-button color="primary" type="submit" [disabled]="isLoading" class="submit-btn">
          @if (isLoginMode) { Войти } @else { Создать аккаунт }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions class="login-actions">
      <button mat-button (click)="toggleMode()" type="button" [disabled]="isLoading">
        @if (isLoginMode) { Нет аккаунта? Зарегистрироваться } @else { Уже есть аккаунт? Войти }
      </button>
    </mat-card-actions>

  </mat-card>
</div>
